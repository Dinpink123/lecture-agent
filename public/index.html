<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>סוכן שיעורים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #080c14;
    --surface: #0e1420;
    --surface2: #151d2e;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --gold: #f59e0b;
    --red: #ef4444;
    --green: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

  /* ── Header ── */
  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a1120 0%, transparent 100%);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(20px);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: all 0.3s;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.recording { background: var(--red); animation: pulse 1s infinite; }
  .status-dot.active { background: var(--accent); }
  .status-dot.success { background: var(--green); }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(1.3); }
  }

  .timer {
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--red);
    margin-top: 8px; text-align: center;
    display: none;
  }
  .timer.visible { display: block; }

  /* ── Auth Banner ── */
  .auth-banner {
    margin: 16px 20px 0;
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  .auth-banner:active { transform: scale(0.98); }
  .auth-banner.connected { border-color: var(--green); }
  .auth-icon { font-size: 22px; }
  .auth-text { flex: 1; }
  .auth-text strong { display: block; font-size: 14px; }
  .auth-text span { font-size: 12px; color: var(--muted); }
  .auth-arrow { color: var(--muted); font-size: 18px; }

  /* ── Panels ── */
  .panels { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .panel-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .panel-toggle { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
  .panel.collapsed .panel-toggle { transform: rotate(-90deg); }

  .panel-body { padding: 14px 16px; }
  .panel.collapsed .panel-body { display: none; }

  .transcript-box {
    min-height: 80px; max-height: 200px; overflow-y: auto;
    font-size: 14px; line-height: 1.8;
    color: var(--text);
    word-break: break-word;
  }
  .transcript-box::-webkit-scrollbar { width: 3px; }
  .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .delta-text { color: var(--accent2); font-style: italic; }
  .empty-hint { color: var(--muted); font-size: 13px; }

  /* Outline */
  .outline-box { font-size: 13px; line-height: 1.7; }
  .topic-title { font-size: 15px; font-weight: 700; color: var(--accent); margin: 10px 0 4px; }
  .topic-title:first-child { margin-top: 0; }
  .subtopic-title { font-size: 13px; font-weight: 600; color: var(--accent2); margin: 6px 0 2px; padding-right: 10px; }
  .bullet { color: var(--text); padding-right: 18px; margin: 2px 0; }
  .bullet::before { content: '•  '; color: var(--accent); }
  .example { color: var(--muted); padding-right: 24px; font-style: italic; font-size: 12px; }
  .example::before { content: '💡 '; }
  .section-divider { margin: 12px 0 6px; padding-top: 10px; border-top: 1px solid var(--border); }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 4px; }
  .definition { padding-right: 10px; margin: 3px 0; }
  .definition strong { color: var(--text); }
  .case-item { padding: 8px 10px; background: var(--surface2); border-right: 3px solid var(--gold); border-radius: 6px; margin: 4px 0; }
  .case-name { font-weight: 700; color: var(--gold); font-size: 12px; }
  .case-ctx { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .exam-q { padding-right: 10px; margin: 3px 0; color: var(--muted); }

  /* Spinner */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Bottom Controls ── */
  .controls {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 16px 20px 32px;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    display: flex; flex-direction: column; gap: 10px;
  }

  .btn-record {
    width: 100%; padding: 18px;
    border: none; border-radius: 999px;
    font-family: 'Heebo', sans-serif;
    font-size: 17px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    box-shadow: 0 8px 32px rgba(59,130,246,0.35);
  }
  .btn-record:active { transform: scale(0.97); }
  .btn-record.recording {
    background: linear-gradient(135deg, var(--red) 0%, #f97316 100%);
    box-shadow: 0 8px 32px rgba(239,68,68,0.35);
  }
  .btn-record:disabled { opacity: 0.5; }

  .btn-secondary {
    width: 100%; padding: 14px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:active { transform: scale(0.98); }
  .btn-secondary:disabled { opacity: 0.4; }
  .btn-secondary.success { border-color: var(--green); color: var(--green); }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }

  /* ── Warning banner ── */
  .warning {
    margin: 0 20px 0;
    padding: 10px 14px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 10px;
    font-size: 12px; color: var(--gold); line-height: 1.5;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">סוכן <span>שיעורים</span></div>
      <div class="status-pill" id="statusPill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">מוכן</span>
      </div>
    </div>
    <div class="timer" id="timer">00:00</div>
  </div>

  <!-- Auth banner -->
  <div class="auth-banner" id="authBanner" onclick="handleGoogleAuth()">
    <div class="auth-icon">🔗</div>
    <div class="auth-text">
      <strong>התחבר ל-Google Docs</strong>
      <span>הסיכום יישמר אוטומטית</span>
    </div>
    <div class="auth-arrow">›</div>
  </div>

  <!-- Warning -->
  <div class="panels">
    <div class="warning" id="screenWarn" style="display:none">
      ⚠️ <strong>חשוב:</strong> השאר את המסך דלוק בזמן ההקלטה. iOS יעצור את המיקרופון אם המסך ייכבה.
    </div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Transcript panel -->
    <div class="panel" id="transcriptPanel">
      <div class="panel-header" onclick="togglePanel('transcriptPanel')">
        <span class="panel-label">📝 תמלול חי</span>
        <span class="panel-toggle">›</span>
      </div>
      <div class="panel-body">
        <div class="transcript-box" id="transcriptBox">
          <span class="empty-hint">התמלול יופיע כאן בזמן אמת...</span>
        </div>
      </div>
    </div>

    <!-- Outline panel -->
    <div class="panel" id="outlinePanel">
      <div class="panel-header" onclick="togglePanel('outlinePanel')">
        <span class="panel-label" id="outlineLabel">📋 סיכום <span id="outlineSpinner" style="display:none"><span class="spinner"></span></span></span>
        <span class="panel-toggle">›</span>
      </div>
      <div class="panel-body">
        <div class="outline-box" id="outlineBox">
          <span class="empty-hint">הסיכום יתעדכן כל מספר דקות...</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn-record" id="recordBtn" onclick="toggleRecording()">
    <span id="recordIcon">▶</span>
    <span id="recordLabel">התחל הקלטה</span>
  </button>
  <button class="btn-secondary" id="exportBtn" onclick="exportToDocs()" disabled>
    <span id="exportLabel">📄 שמור ב-Google Docs</span>
  </button>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const sessionId = 'sess_' + Math.random().toString(36).slice(2);
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let fullTranscript = '';
let currentOutline = null;
let isGoogleAuthed = false;
let timerInterval = null;
let timerSeconds = 0;
let summaryInterval = null;
let pendingChunk = '';
let lastSummaryAt = Date.now();
const SUMMARY_EVERY_MS = 3 * 60 * 1000; // 3 דקות

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('message', (e) => {
  if (e.data?.type === 'google_auth_success') {
    checkAuthStatus();
    toast('✅ התחברת ל-Google!', 'success');
  }
});

window.addEventListener('load', () => {
  checkAuthStatus();
  document.getElementById('screenWarn').style.display = 'block';
});

// ─── Google Auth ──────────────────────────────────────────────────────────────
function handleGoogleAuth() {
  if (isGoogleAuthed) { toast('כבר מחובר ✓', 'success'); return; }
  const w = window.open(`/auth/google?sessionId=${sessionId}`, '_blank', 'width=500,height=600');
  if (!w) toast('אפשר חלונות קופצים בדפדפן', 'error');
}

async function checkAuthStatus() {
  try {
    const r = await fetch(`/auth/status?sessionId=${sessionId}`);
    const d = await r.json();
    isGoogleAuthed = d.authenticated;
    const banner = document.getElementById('authBanner');
    if (isGoogleAuthed) {
      banner.classList.add('connected');
      banner.querySelector('strong').textContent = '✅ מחובר ל-Google Docs';
      banner.querySelector('span').textContent = 'הסיכום יישמר אוטומטית';
    }
  } catch {}
}

// ─── Recording ────────────────────────────────────────────────────────────────
async function toggleRecording() {
  if (!isRecording) await startRecording();
  else await stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: {
      sampleRate: 16000, channelCount: 1,
      echoCancellation: true, noiseSuppression: true,
    }});

    // reset state
    fullTranscript = '';
    currentOutline = null;
    pendingChunk = '';
    audioChunks = [];
    document.getElementById('transcriptBox').innerHTML = '<span class="delta-text">מקשיב...</span>';
    document.getElementById('outlineBox').innerHTML = '<span class="empty-hint">הסיכום יתעדכן כל מספר דקות...</span>';
    document.getElementById('exportBtn').disabled = true;

    mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    // כל 30 שניות שלח chunk לתמלול
    mediaRecorder.start(30000);

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (audioChunks.length > 0) {
        await transcribeChunks(true);
      }
    };

    // תמלול running chunks
    summaryInterval = setInterval(async () => {
      if (audioChunks.length > 0) {
        await transcribeChunks(false);
      }
    }, 30000);

    isRecording = true;
    setStatus('recording', 'מקליט');
    startTimer();

    const btn = document.getElementById('recordBtn');
    btn.classList.add('recording');
    document.getElementById('recordIcon').textContent = '⏹';
    document.getElementById('recordLabel').textContent = 'עצור הקלטה';

    toast('🎙️ ההקלטה התחילה', 'success');
  } catch (err) {
    toast('❌ ' + (err.name === 'NotAllowedError' ? 'אשר גישה למיקרופון' : err.message), 'error');
  }
}

async function stopRecording() {
  if (!mediaRecorder) return;
  clearInterval(summaryInterval);
  stopTimer();
  setStatus('active', 'מסכם...');

  document.getElementById('recordBtn').disabled = true;
  mediaRecorder.stop();

  // המתן לעיבוד הסופי
  await new Promise(r => setTimeout(r, 2000));

  // סיכום סופי
  if (fullTranscript) {
    await runSummary(true);
  }

  isRecording = false;
  const btn = document.getElementById('recordBtn');
  btn.classList.remove('recording');
  btn.disabled = false;
  document.getElementById('recordIcon').textContent = '▶';
  document.getElementById('recordLabel').textContent = 'הקלטה חדשה';
  document.getElementById('exportBtn').disabled = !currentOutline && !fullTranscript;
  setStatus('success', 'הסתיים');
  toast('✅ ההקלטה הסתיימה', 'success');
}

// ─── Transcription ────────────────────────────────────────────────────────────
async function transcribeChunks(isFinal) {
  if (audioChunks.length === 0) return;

  const chunksToProcess = [...audioChunks];
  audioChunks = [];

  setStatus('active', 'מתמלל...');

  try {
    const blob = new Blob(chunksToProcess, { type: chunksToProcess[0].type });
    const formData = new FormData();
    formData.append('file', blob, 'audio.webm');
    formData.append('model', 'whisper-1');
    formData.append('language', 'he');
    formData.append('prompt', 'זוהי הרצאה אקדמית בעברית. תמלל במדויק.');

    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${await getApiKey()}` },
      body: formData,
    });

    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    if (data.text?.trim()) {
      const timestamp = formatTime(timerSeconds);
      const newText = `[${timestamp}] ${data.text}\n`;
      fullTranscript += newText;
      pendingChunk += newText;
      renderTranscript();

      // בדוק אם הגיע הזמן לסכם
      if (Date.now() - lastSummaryAt > SUMMARY_EVERY_MS) {
        await runSummary(false);
      }
    }

    setStatus(isRecording ? 'recording' : 'active', isRecording ? 'מקליט' : 'עובד...');
  } catch (err) {
    console.error('Transcription error:', err);
    toast('שגיאת תמלול: ' + err.message, 'error');
    // החזר chunks אם נכשל
    audioChunks = [...chunksToProcess, ...audioChunks];
  }
}

async function getApiKey() {
  // ה-API key מגיע מהשרת (לא נחשף ב-client)
  const r = await fetch('/api/get-key');
  const d = await r.json();
  return d.key;
}

// ─── Summary ──────────────────────────────────────────────────────────────────
async function runSummary(isFinal) {
  if (!pendingChunk.trim() && !isFinal) return;

  const chunkToProcess = pendingChunk;
  pendingChunk = '';
  lastSummaryAt = Date.now();

  document.getElementById('outlineSpinner').style.display = 'inline';

  try {
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        transcript: chunkToProcess || fullTranscript,
        currentOutline,
        isFinal,
      }),
    });

    const data = await res.json();
    if (data.outline) {
      currentOutline = data.outline;
      renderOutline(currentOutline);
      document.getElementById('exportBtn').disabled = false;
    }
  } catch (err) {
    pendingChunk = chunkToProcess + pendingChunk;
    toast('שגיאת סיכום', 'error');
  } finally {
    document.getElementById('outlineSpinner').style.display = 'none';
  }
}

// ─── Export to Google Docs ────────────────────────────────────────────────────
async function exportToDocs() {
  if (!isGoogleAuthed) {
    handleGoogleAuth();
    return;
  }

  document.getElementById('exportLabel').textContent = '⏳ יוצר מסמך...';
  document.getElementById('exportBtn').disabled = true;

  try {
    const res = await fetch('/api/create-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, outline: currentOutline, transcript: fullTranscript }),
    });

    const data = await res.json();
    if (data.docUrl) {
      document.getElementById('exportBtn').classList.add('success');
      document.getElementById('exportLabel').textContent = '✅ נפתח ב-Google Docs';
      document.getElementById('exportBtn').disabled = false;
      window.open(data.docUrl, '_blank');
      toast('✅ המסמך נוצר בהצלחה!', 'success');
    } else {
      throw new Error(data.error || 'שגיאה לא ידועה');
    }
  } catch (err) {
    document.getElementById('exportLabel').textContent = '📄 שמור ב-Google Docs';
    document.getElementById('exportBtn').disabled = false;
    toast('❌ ' + err.message, 'error');
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTranscript() {
  const box = document.getElementById('transcriptBox');
  box.textContent = fullTranscript;
  box.scrollTop = box.scrollHeight;
}

function renderOutline(o) {
  if (!o) return;
  const box = document.getElementById('outlineBox');
  let html = '';

  if (o.topics?.length) {
    o.topics.forEach((topic, i) => {
      html += `<div class="topic-title">${i+1}. ${esc(topic.title)}</div>`;
      topic.subtopics?.forEach(sub => {
        html += `<div class="subtopic-title">${esc(sub.title)}</div>`;
        sub.bullets?.forEach(b => { html += `<div class="bullet">${esc(b)}</div>`; });
        sub.examples?.forEach(e => { html += `<div class="example">${esc(e)}</div>`; });
      });
    });
  }

  if (o.definitions?.length) {
    html += `<div class="section-divider"><div class="section-label">מושגים</div></div>`;
    o.definitions.forEach(d => {
      html += `<div class="definition"><strong>${esc(d.term)}:</strong> ${esc(d.meaning)}</div>`;
    });
  }

  if (o.cases_or_laws?.length) {
    html += `<div class="section-divider"><div class="section-label">⚖️ פסקי דין וחוקים</div></div>`;
    o.cases_or_laws.forEach(c => {
      html += `<div class="case-item"><div class="case-name">${esc(c.name)}</div><div class="case-ctx">${esc(c.context)}</div></div>`;
    });
  }

  if (o.exam_questions?.length) {
    html += `<div class="section-divider"><div class="section-label">❓ שאלות בחינה</div></div>`;
    o.exam_questions.forEach((q,i) => {
      html += `<div class="exam-q">${i+1}. ${esc(q)}</div>`;
    });
  }

  box.innerHTML = html || '<span class="empty-hint">עדיין מעבד...</span>';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  timerSeconds = 0;
  const el = document.getElementById('timer');
  el.classList.add('visible');
  timerInterval = setInterval(() => {
    timerSeconds++;
    el.textContent = formatTime(timerSeconds);
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
}
function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function setStatus(type, label) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  text.textContent = label;
}

function togglePanel(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}
